<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spike B — Layer Composition (blend / additive / verlet)</title>
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; height: 100%; background: #0e1116; color: #d7dde5; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
    #wrap { display: flex; gap: 18px; padding: 16px; align-items: flex-start; flex-wrap: wrap; }
    #stage { background: radial-gradient(120% 90% at 50% 20%, #1a2130 0%, #0e1116 70%); border: 1px solid #232a36; border-radius: 10px; }
    #panel { max-width: 420px; }
    h1 { font-size: 14px; margin: 0 0 8px; color: #9fd0ff; }
    button { background: #1b2431; color: #cfe6ff; border: 1px solid #2c3a4e; border-radius: 6px; padding: 6px 10px; cursor: pointer; font: inherit; margin: 0 6px 6px 0; }
    button:hover { background: #24344a; }
    #stats { white-space: pre-wrap; background: #11151c; border: 1px solid #222a36; border-radius: 8px; padding: 10px; margin-top: 10px; font-size: 12px; }
    .mode { color: #ffd479; }
    .bone { stroke: #cfe6ff; stroke-width: 6; stroke-linecap: round; }
    .verlet { stroke: #ff9d6e; }
    .joint { fill: #7fb2ff; }
    .head { fill: #ffd479; stroke: #b98a2e; stroke-width: 2; }
    .hand { fill: #ff9d6e; }
  </style>
</head>
<body>
  <div id="wrap">
    <svg id="stage" width="480" height="520" viewBox="0 0 480 520"></svg>
    <div id="panel">
      <h1>Spike B — base blend → additive breathing → verlet follow-through</h1>
      <div>
        <button onclick="window.__blendTo('cheer',650)">→ CHEER</button>
        <button onclick="window.__blendTo('stand',650)">→ STAND</button>
        <button onclick="window.__blendStress()">STRESS retarget</button>
        <button onclick="window.__autoBlend()">toggle auto</button>
        <button onclick="window.__setMode('smoothdamp')">mode: smoothdamp</button>
        <button onclick="window.__setMode('lerp')">mode: lerp</button>
        <button onclick="window.__blendReset()">reset stats</button>
      </div>
      <div id="stats">booting…</div>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
