name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (site + node + server + engine packages)
        run: bun run typecheck

      - name: Determinism lint (engine + headless)
        run: bun run lint:determinism

      # Headless engine suite — no browser; must pass in plain Bun.
      - name: Engine tests
        run: bun run test:engine

      # Keep master shippable (tsc + vite build).
      - name: Build site
        run: bun run build
